name: wiki

# Gate + materialize the brain into this repo's wiki on every merge to main —
# via the shared reusable workflow. The engine lives in paddyodab/dist-brain-metadata-tooling.
on:
  push:
    branches: [main]

jobs:
  wiki:
    uses: paddyodab/dist-brain-metadata-tooling/.github/workflows/wiki.yml@v1
    secrets:
      wiki-token: ${{ secrets.WIKI_TOKEN }}
