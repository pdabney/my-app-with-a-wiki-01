name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # Tier-1 metadata gate — via the shared reusable workflow (engine not vendored here).
  gate:
    uses: paddyodab/dist-brain-metadata-tooling/.github/workflows/gate.yml@v1

  verify:
    uses: paddyodab/dist-brain-metadata-tooling/.github/workflows/verify.yml@v1.6

  # IaC required-tags gate — fails if any taggable resource is missing a required tag.
  tags:
    uses: paddyodab/dist-brain-metadata-tooling/.github/workflows/tags.yml@v1

  # App tests stay local to this repo.
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install pytest
          PYTHONPATH=src pytest -q
