# Distributed-brain MCP — agent depth surface over graph.json
# Replace pdabney and my-app-with-a-wiki-01 with your consumer repo (the one whose wiki materializes).
# Or set DIST_BRAIN_GRAPH to a local path after running materialize.py.

[mcp_servers.dist-brain]
command = "/home/patdabney/Documents/GitHub/dist-brain-metadata-tooling/.venv/bin/python3"
args = ["/home/patdabney/Documents/GitHub/dist-brain-metadata-tooling/mcp/server.py"]
enabled = true
startup_timeout_sec = 15

[mcp_servers.dist-brain.env]
DIST_BRAIN_GRAPH = "/home/patdabney/.grok/brains/my-app-with-a-wiki-01/brain.sqlite"
DIST_BRAIN_REVISION = "main"
# After wiki CI publishes sqlite (wiki.yml @v1.7+), switch to:
# DIST_BRAIN_GRAPH = "https://raw.githubusercontent.com/wiki/pdabney/my-app-with-a-wiki-01/brain.sqlite"